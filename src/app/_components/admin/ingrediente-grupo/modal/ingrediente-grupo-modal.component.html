<div class="modal-header">
  <h5 class="modal-title">{{ item?.id ? 'Editar' : 'Novo' }} Grupo</h5>
  <button type="button" class="btn-close" (click)="bsModalRef.hide()"></button>
</div>

<div class="modal-body">
  <form [formGroup]="form">

    <div class="mb-3">
      <label class="form-label">Nome <span class="text-danger">*</span></label>
      <input type="text" class="form-control" formControlName="nome"
             [class.is-invalid]="f['nome'].touched && f['nome'].invalid"
             placeholder="Ex: Pré-fermento" />
      @if (f['nome'].touched && f['nome'].errors?.['required']) {
        <div class="invalid-feedback">Nome é obrigatório.</div>
      }
    </div>

    <div class="mb-3">
      <label class="form-label">Ordem <span class="text-danger">*</span></label>
      <input type="number" class="form-control" formControlName="ordem" min="0" step="1"
             [class.is-invalid]="f['ordem'].touched && f['ordem'].invalid" />
      <div class="form-text">Menor número aparece primeiro na receita.</div>
    </div>

  </form>
</div>

<div class="modal-footer">
  <button type="button" class="btn btn-secondary" (click)="bsModalRef.hide()">Cancelar</button>
  <button type="button" class="btn btn-primary" (click)="salvar()" [disabled]="form.invalid">
    <i class="fas fa-save me-1"></i> Salvar
  </button>
</div>
