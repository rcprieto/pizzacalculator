<div class="admin-shell">

  <header class="admin-topbar">
    <a routerLink="/" class="admin-topbar-btn">
      <i class="fas fa-arrow-left"></i>
    </a>
    <span class="admin-topbar-titulo">Administração</span>
    <button class="admin-topbar-btn" (click)="sair()" title="Sair">
      <i class="fas fa-sign-out-alt"></i>
    </button>
  </header>

  <nav class="admin-tabs">
    <a class="admin-tab" routerLink="/admin/ingredientes" routerLinkActive="active">
      <i class="fas fa-cubes"></i>
      <span>Ingredientes</span>
    </a>
    <a class="admin-tab" routerLink="/admin/ingrediente-grupos" routerLinkActive="active">
      <i class="fas fa-layer-group"></i>
      <span>Grupos</span>
    </a>
    <a class="admin-tab" routerLink="/admin/receitas" routerLinkActive="active">
      <i class="fas fa-book-open"></i>
      <span>Receitas</span>
    </a>
  </nav>

  <router-outlet />

</div>
