<div class="admin-content">

  <div class="admin-toolbar">
    <div class="admin-search-wrap">
      <i class="fas fa-search admin-search-icon"></i>
      <input type="text" class="admin-search-input" placeholder="Buscar receita..."
             [(ngModel)]="search" (keyup.enter)="buscar()" />
    </div>
    <button class="admin-add-btn" (click)="abrirModal()" title="Nova receita">
      <i class="fas fa-plus"></i>
    </button>
  </div>

  <div class="admin-list">
    @for (item of receitas; track item.id) {
    <div class="admin-item">
      <div class="admin-item-icon admin-item-icon--rec">
        <i class="fas fa-bread-slice"></i>
      </div>
      <div class="admin-item-body">
        <span class="admin-item-title">{{ item.nome }}</span>
        <span class="admin-item-sub">
          {{ item.itens.length }} ingrediente{{ item.itens.length !== 1 ? 's' : '' }}
          <span class="admin-item-badge">{{ calcularPreco(item) | currency:'BRL':'symbol':'1.2-2' }}</span>
        </span>
      </div>
      <div class="admin-item-actions">
        <button class="action-btn action-btn--edit" (click)="abrirModal(item)" title="Editar">
          <i class="fas fa-edit"></i>
        </button>
        <button class="action-btn action-btn--del" (click)="confirmarExclusao(item)" title="Excluir">
          <i class="fas fa-trash"></i>
        </button>
      </div>
    </div>
    }
    @empty {
    <div class="admin-empty">
      <i class="fas fa-bread-slice fa-2x"></i>
      <span>Nenhuma receita encontrada.</span>
    </div>
    }
  </div>

  @if (pagination && pagination.totalPages > 1) {
  <pagination
    [totalItems]="pagination.totalItems"
    [itemsPerPage]="pageSize"
    [(ngModel)]="pageNumber"
    (pageChanged)="pageChanged($event)"
    [maxSize]="5"
    class="d-flex justify-content-center py-3">
  </pagination>
  }

</div>
