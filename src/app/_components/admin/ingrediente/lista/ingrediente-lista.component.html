<div class="container-fluid mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Ingredientes</h4>
    <button class="btn btn-primary btn-sm" (click)="abrirModal()">
      <i class="fas fa-plus me-1"></i> Novo Ingrediente
    </button>
  </div>

  <div class="input-group mb-3" style="max-width: 400px;">
    <input type="text" class="form-control form-control-sm" placeholder="Buscar..." [(ngModel)]="search" (keyup.enter)="buscar()" />
    <button class="btn btn-outline-secondary btn-sm" (click)="buscar()">
      <i class="fas fa-search"></i>
    </button>
  </div>

  <div class="table-responsive">
    <table class="table table-hover table-sm">
      <thead class="table-dark">
        <tr>
          <th>Nome</th>
          <th>Marca</th>
          <th class="text-end">Preço</th>
          <th class="text-center" style="width: 120px;">Ações</th>
        </tr>
      </thead>
      <tbody>
        @for (item of ingredientes; track item.id) {
          <tr>
            <td>{{ item.nome }}</td>
            <td>{{ item.marca }}</td>
            <td class="text-end">{{ item.preco | currency:'BRL' }}</td>
            <td class="text-center">
              <button class="btn btn-outline-primary btn-sm me-1" (click)="abrirModal(item)" title="Editar">
                <i class="fas fa-edit"></i>
              </button>
              <button class="btn btn-outline-danger btn-sm"
                (click)="confirmarExclusao(item)" title="Excluir">
                <i class="fas fa-trash"></i>
              </button>
            </td>
          </tr>
        }
        @empty {
          <tr><td colspan="4" class="text-center text-muted py-4">Nenhum ingrediente encontrado.</td></tr>
        }
      </tbody>
    </table>
  </div>

  @if (pagination && pagination.totalPages > 1) {
    <pagination
      [totalItems]="pagination.totalItems"
      [itemsPerPage]="pageSize"
      [(ngModel)]="pageNumber"
      (pageChanged)="pageChanged($event)"
      [maxSize]="5"
      class="d-flex justify-content-center">
    </pagination>
  }
</div>
