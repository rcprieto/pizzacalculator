<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow-sm" style="width: 360px;">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="fas fa-lock fa-2x text-primary mb-2"></i>
        <h5 class="mb-0">Administração</h5>
        <small class="text-muted">Acesso restrito</small>
      </div>

      <form [formGroup]="form" (ngSubmit)="entrar()">
        <div class="mb-3">
          <label class="form-label">E-mail</label>
          <input type="email" class="form-control" formControlName="email" autocomplete="email"
            [class.is-invalid]="f['email'].touched && f['email'].invalid" />
          @if (f['email'].touched && f['email'].errors?.['required']) {
            <div class="invalid-feedback">E-mail obrigatório.</div>
          }
        </div>

        <div class="mb-4">
          <label class="form-label">Senha</label>
          <input type="password" class="form-control" formControlName="password" autocomplete="current-password"
            [class.is-invalid]="f['password'].touched && f['password'].invalid" />
          @if (f['password'].touched && f['password'].errors?.['required']) {
            <div class="invalid-feedback">Senha obrigatória.</div>
          }
        </div>

        @if (erro) {
          <div class="alert alert-danger py-2 mb-3">{{ erro }}</div>
        }

        <button type="submit" class="btn btn-primary w-100" [disabled]="form.invalid || carregando">
          @if (carregando) { <span class="spinner-border spinner-border-sm me-2"></span> }
          Entrar
        </button>
      </form>

      <div class="text-center mt-3">
        <a routerLink="/" class="text-muted small">← Voltar ao início</a>
      </div>
    </div>
  </div>
</div>
